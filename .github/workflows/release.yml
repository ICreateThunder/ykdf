name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
      id-token: write # keyless cosign signing via GitHub OIDC
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    outputs:
      # NOTE: this single `hashes` output assumes a single-entry matrix. If more
      # targets are ever added below, a matrix job's output is overwritten by the
      # last entry, so provenance would cover only one artifact. When that
      # happens, collect each target's hashes (e.g. upload per-target hash files
      # and merge them in a separate non-matrix job) before feeding the SLSA
      # generator. See the provenance job.
      hashes: ${{ steps.hash.outputs.hashes }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_suffix: x86_64-linux
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev libusb-1.0-0-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}
      - name: Run tests
        run: cargo test --workspace
      - name: Build release binary
        run: cargo build --release --package ykdf --target ${{ matrix.target }}
      - name: Package
        run: |
          archive="ykdf-${{ github.ref_name }}-${{ matrix.archive_suffix }}.tar.gz"
          tar czf "${archive}" -C target/${{ matrix.target }}/release ykdf
          sha256sum "${archive}" > "${archive}.sha256"
          sha512sum "${archive}" > "${archive}.sha512"
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign artifact (keyless)
        # Keyless signing via the workflow's GitHub OIDC identity. Produces a
        # Sigstore bundle (signature + certificate + Rekor entry) logged in the
        # public transparency log. The `.sigstore.json` extension is the
        # canonical Sigstore bundle name and the one OpenSSF Scorecard's
        # signed-releases check recognises. Verify with `cosign verify-blob
        # --bundle` (see README).
        run: |
          cosign sign-blob --yes \
            --bundle "${ARCHIVE}.sigstore.json" \
            "${ARCHIVE}"
      - name: Generate subject hashes for provenance
        id: hash
        # Base64-encoded `sha256sum` line consumed by the SLSA generator as the
        # provenance subject.
        run: echo "hashes=$(sha256sum "${ARCHIVE}" | base64 -w0)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: |
            ykdf-*.tar.gz
            ykdf-*.tar.gz.sha256
            ykdf-*.tar.gz.sha512
            ykdf-*.tar.gz.sigstore.json
          retention-days: 1

  provenance:
    needs: [build]
    permissions:
      actions: read # read the workflow run to build provenance
      id-token: write # sign the provenance via Sigstore (OIDC)
      contents: read
    # SLSA build provenance. Produces a signed `<artifact>.intoto.jsonl`
    # attestation, which OpenSSF Scorecard's signed-releases check recognises as
    # provenance. The release job downloads it (as a run artifact) and publishes
    # it with the release.
    # NOTE: this reusable workflow MUST be referenced by an immutable semantic
    # version tag, not a commit SHA. The generator verifies its own ref by tag,
    # so SHA pinning breaks its trust model. This is the documented exception to
    # our otherwise-SHA-pinned actions.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      # Do NOT upload to the release here: GitHub immutable releases reject
      # post-publish asset uploads, so every asset must go in the single
      # `gh release create` call below. The provenance is exposed as a run
      # artifact and picked up by the release job's download-all step.
      upload-assets: false

  release:
    permissions:
      contents: write
    needs: [build, provenance]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          # No `name`: download every artifact from this run (the build assets
          # and the SLSA provenance), flattened into one directory.
          path: artifacts
          merge-multiple: true
      - name: Extract release notes
        run: |
          tag="${GITHUB_REF_NAME#v}"
          sed -n "/^## \[${tag}\]/,/^## \[/{/^## \[${tag}\]/d;/^## \[/d;p;}" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog entry found for ${tag}" > release-notes.md
          fi
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            artifacts/*
