name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_suffix: x86_64-linux
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev libusb-1.0-0-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}
      - name: Run tests
        run: cargo test --workspace
      - name: Build release binary
        run: cargo build --release --package ykdf --target ${{ matrix.target }}
      - name: Package
        run: |
          archive="ykdf-${{ github.ref_name }}-${{ matrix.archive_suffix }}.tar.gz"
          tar czf "${archive}" -C target/${{ matrix.target }}/release ykdf
          sha256sum "${archive}" > "${archive}.sha256"
          sha512sum "${archive}" > "${archive}.sha512"
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: |
            ykdf-*.tar.gz
            ykdf-*.tar.gz.sha256
            ykdf-*.tar.gz.sha512
          retention-days: 1

  release:
    permissions:
      contents: write
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true
      - name: Extract release notes
        run: |
          tag="${GITHUB_REF_NAME#v}"
          sed -n "/^## \[${tag}\]/,/^## \[/{/^## \[${tag}\]/d;/^## \[/d;p;}" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog entry found for ${tag}" > release-notes.md
          fi
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            artifacts/*
