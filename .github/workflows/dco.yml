name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dco-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          fail=0
          for sha in $(git rev-list "$base".."$head"); do
            author=$(git log -1 --format='%ae' "$sha")

            # Exempt Dependabot
            if [ "$author" = "49699333+dependabot[bot]@users.noreply.github.com" ]; then
              continue
            fi

            if ! git log -1 --format='%B' "$sha" | grep -qi '^Signed-off-by:'; then
              echo "Missing Signed-off-by: $sha ($(git log -1 --format='%s' "$sha"))"
              fail=1
            fi
          done

          if [ "$fail" -eq 1 ]; then
            echo ""
            echo "Fix: git rebase --signoff HEAD~N && git push --force-with-lease"
            exit 1
          fi
