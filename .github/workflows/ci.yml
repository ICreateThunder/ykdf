name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev libusb-1.0-0-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev libusb-1.0-0-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace

  go-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: references/go/go.mod
          cache-dependency-path: references/go/go.sum
      # The independent Go reference implementation must reproduce every byte in
      # vectors/v1.json. This is the cross-implementation conformance gate for
      # the frozen v1 format (see references/README.md and ROADMAP.md).
      - name: gofmt
        working-directory: references/go
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo 'run gofmt -w .'; exit 1; }
      - name: go vet
        working-directory: references/go
        run: go vet ./...
      - name: go test (golden vectors)
        working-directory: references/go
        run: go test ./...

  c-conformance:
    runs-on: ubuntu-latest
    # Debian trixie ships OpenSSL >= 3.5, whose providers do native ML-KEM /
    # ML-DSA seed key generation; ubuntu-latest still has OpenSSL 3.0.
    container: debian:trixie-slim
    timeout-minutes: 10
    steps:
      # git must exist before actions/checkout runs inside the container, and
      # build-essential pulls gcc, make, and libc6-dev (the C headers a bare gcc
      # lacks under --no-install-recommends).
      - name: Install toolchain
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git build-essential pkg-config libsodium-dev libssl-dev python3 ca-certificates
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Show OpenSSL version
        run: openssl version
      # The independent C reference (libsodium + OpenSSL) must reproduce every
      # byte in vectors/v1.json. With the Go reference this is the second,
      # primitive-stack-independent pass of the 1.0 conformance gate.
      - name: Build and run golden vectors
        working-directory: references/c
        run: make test

  wasm-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - run: cargo check -p ykdf-core --no-default-features --target wasm32-unknown-unknown

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev libusb-1.0-0-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build documentation
        # Fail on broken intra-doc links and any rustdoc warning, so the docs
        # that ship to docs.rs (once published) and `cargo doc` stay correct.
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all-features --workspace

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20

  osv-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Presence-based dependency vulnerability scan across the Cargo workspace
      # and the Go reference module (Cargo.lock + references/go/go.sum). This is
      # the same OSV check the weekly OpenSSF Scorecard runs, but at PR time, so
      # an advisory in a dependency fails the PR instead of surfacing later.
      # IgnoredVulns in osv-scanner.toml (unreachable transitive advisories) are
      # honored.
      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --config=osv-scanner.toml
            --recursive
            ./

  miri:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned
        with:
          toolchain: nightly
          components: miri
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Detects undefined behaviour in the core byte-paths (extract, expand,
      # cascade, profile post-processing). Scoped to a fast target that omits
      # ML-KEM/Argon2/proptest so the interpreter stays within CI time.
      - run: cargo miri test -p ykdf-core --test miri_core

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # Bounded smoke fuzzing of the untrusted-input surfaces (parser, IKM,
      # full raw derivation). Deep fuzzing is a manual/local activity; this
      # only guards against shallow regressions on each change.
      - name: Run bounded fuzzing
        run: |
          for target in context_parse ikm_extract derive_raw; do
            cargo fuzz run "$target" -- -runs=100000 -max_total_time=30
          done

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      # Informational: reports ykdf-core coverage. Not a gate (see CONTRIBUTING
      # for the soft target and why the remaining lines are intentionally
      # uncovered defensive arms).
      - name: Coverage
        run: cargo llvm-cov --package ykdf-core --features argon2 --summary-only

