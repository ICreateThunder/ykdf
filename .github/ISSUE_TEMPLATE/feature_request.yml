name: Feature Request
description: Suggest a feature
title: "feat: "
labels: [kind:feature, status:triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: dco
    attributes:
      label: DCO
      options:
        - label: I agree to the [DCO](../../blob/main/CONTRIBUTING.md)
          required: true
