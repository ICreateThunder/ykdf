version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    groups:
      rust-minor-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "chore(deps)"
    labels:
      - kind:chore
      - area:deps

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    commit-message:
      prefix: "chore(deps-ci)"
    labels:
      - kind:chore
      - area:deps
      - area:ci
