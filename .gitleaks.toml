title = "ykdf gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Project-level path allowlist"
paths = [
  '''(?:^|/)target/''',
  '''(?:^|/)\.gitleaksignore$''',
  '''docs/security/.*\.asc''',
  '''testdata/.*\.pem''',
  '''fixtures/.*\.pem''',
  # Deterministic public golden test vectors (hex, not secrets).
  '''(?:^|/)vectors/.*\.json$''',
  # Generated reference-impl build artifacts that transcribe those same vectors.
  '''(?:^|/)references/.*/build/''',
]
