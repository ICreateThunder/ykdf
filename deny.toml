[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[output]
feature-depth = 1

# Advisories
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# RUSTSEC-2023-0071: Marvin Attack on RSA (rsa crate). Transitive via
# yubikey 0.8 -> rsa 0.9. We only use P-256 ECDH, never RSA operations.
ignore = ["RUSTSEC-2023-0071"]

# Licenses
# YKDF ships under GPL-3.0-only. The allow list is trimmed to licences
# actually present in the dependency graph: a new licence in any future
# dependency fails the check until it is reviewed and added here.
[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MIT",
    "Unicode-3.0",
    "GPL-3.0-only",
]

# Bans
[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
# Transitional duplicates from the RustCrypto digest 0.10 -> 0.11 split. The
# old-generation copies (sha2 0.10, digest 0.10, rand_core 0.6, der 0.7, pkcs8
# 0.10, spki 0.7, const-oid 0.9, signature 2.2, hmac 0.12, block-buffer 0.10,
# crypto-common 0.1, getrandom 0.2) are pinned by yubikey 0.8 via
# p256/p384/elliptic-curve/ecdsa 0.13, and digest 0.10 additionally by argon2
# 0.5 (blake2 0.10). The newer der/pkcs8/spki/signature copies come from
# ml-dsa 0.1. They collapse once yubikey moves to RustCrypto 0.14 (p256 0.14)
# and argon2 0.6 / blake2 0.11 land stable; all are pre-release today. Skipped
# explicitly so any NEW unexpected duplicate still fails.
skip = [
    { crate = "block-buffer" },
    { crate = "const-oid" },
    { crate = "cpufeatures" },
    { crate = "crypto-common" },
    { crate = "der" },
    { crate = "digest" },
    { crate = "getrandom" },
    { crate = "hmac" },
    { crate = "pkcs8" },
    { crate = "rand_core" },
    { crate = "sha2" },
    { crate = "signature" },
    { crate = "spki" },
]
skip-tree = []

# Sources
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
