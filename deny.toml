[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[output]
feature-depth = 1

# Advisories
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

# Licenses
# YKDF ships under GPL-3.0-only. The allow list is trimmed to licences
# actually present in the dependency graph: a new licence in any future
# dependency fails the check until it is reviewed and added here.
[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "BSD-3-Clause",
    "MIT",
    "Unicode-3.0",
    "GPL-3.0-only",
]

# Bans
[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
# Transitional duplicates from the RustCrypto digest 0.10 -> 0.11 split:
# ml-kem 0.3 rides the digest 0.11 stack while the dalek crates and our
# direct sha2/sha3/hkdf deps ride 0.10. Outside our control until dalek
# migrates. Skipped explicitly so any NEW unexpected duplicate still fails.
skip = [
    { crate = "block-buffer" },
    { crate = "cpufeatures" },
    { crate = "crypto-common" },
    { crate = "digest" },
    { crate = "keccak" },
    { crate = "rand_core" },
    { crate = "sha3" },
]
skip-tree = []

# Sources
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
