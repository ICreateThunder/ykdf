[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[output]
feature-depth = 1

# Advisories
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# RUSTSEC-2023-0071: Marvin Attack on RSA (rsa crate). Transitive via
# yubikey 0.8 -> rsa 0.9. We only use P-256 ECDH, never RSA operations.
ignore = ["RUSTSEC-2023-0071"]

# Licenses
# YKDF ships under GPL-3.0-only. The allow list is trimmed to licences
# actually present in the dependency graph: a new licence in any future
# dependency fails the check until it is reviewed and added here.
[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MIT",
    "Unicode-3.0",
    "GPL-3.0-only",
]

# Bans
[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
# Transitional duplicates from the RustCrypto digest 0.10 -> 0.11 split
# and yubikey/yubikey-hmac-otp transitive dependencies. ed25519-dalek 2.x
# still pins digest 0.10 (via sha2 0.10). The der/pkcs8/signature/spki
# duplicates come from ml-dsa 0.1, which tracks a newer RustCrypto trait
# generation than p256 0.13 / yubikey. Skipped explicitly so any NEW
# unexpected duplicate still fails.
skip = [
    { crate = "block-buffer" },
    { crate = "const-oid" },
    { crate = "cpufeatures" },
    { crate = "crypto-common" },
    { crate = "der" },
    { crate = "digest" },
    { crate = "getrandom" },
    { crate = "hmac" },
    { crate = "pkcs8" },
    { crate = "rand_core" },
    { crate = "sha2" },
    { crate = "signature" },
    { crate = "spki" },
]
skip-tree = []

# Sources
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
