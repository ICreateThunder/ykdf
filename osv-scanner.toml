# Configuration for osv-scanner: the PR-time `osv-scan` CI job, the local
# scripts/check-supply-chain.sh step, and the weekly OpenSSF Scorecard
# Vulnerabilities check all read it.
#
# Scope: the shipped product's dependency graph (the workspace Cargo.lock) and
# the Go reference module (references/go/go.sum). The detached manual tooling
# crates (fuzz/, timing/) do not commit a Cargo.lock, so they are not scanned.
# The single remaining advisory is a transitive dependency that is never reached
# at runtime, documented below and also ignored in .cargo/audit.toml and
# deny.toml.

[[IgnoredVulns]]
id = "RUSTSEC-2023-0071"
reason = "Marvin Attack on the rsa crate (timing side-channel key recovery). Transitive via yubikey 0.8 -> rsa 0.9. YKDF performs only P-256 ECDH on the PIV applet and never executes any RSA operation, so the vulnerable code path is unreachable. No fixed rsa release exists; tracked upstream."
